name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run typecheck
      - name: Test (if any)
        run: |
          if find . -name '*.test.ts' -not -path './node_modules/*' -print -quit | grep -q .; then
            bun test
          else
            echo "No test files — skipping."
          fi
      - run: bun build src/cli.ts --compile --outfile dist/tick
      - run: ./dist/tick --version
